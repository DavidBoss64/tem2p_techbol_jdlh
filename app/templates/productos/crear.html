{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom border-light pt-4 pb-3">
                <h4 class="mb-0 fw-bold text-dark">Registrar Nuevo Producto</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('bp_productos.crear') }}" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold text-muted">Nombre del Producto</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="precio" class="form-label fw-semibold text-muted">Precio Unitario</label>
                            <input type="number" step="0.01" class="form-control" id="precio" name="precio" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="stock" class="form-label fw-semibold text-muted">Cantidad en Stock</label>
                            <input type="number" class="form-control" id="stock" name="stock" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('bp_productos.index') }}" class="btn btn-light border">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4">Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
