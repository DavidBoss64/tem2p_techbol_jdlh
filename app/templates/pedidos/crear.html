{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom border-light pt-4 pb-3">
                <h4 class="mb-0 fw-bold text-dark">Registrar Nuevo Pedido</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('bp_pedidos.crear') }}" method="POST">
                    <div class="mb-3">
                        <label for="cliente_id" class="form-label fw-semibold text-muted">Seleccionar Cliente</label>
                        <select class="form-select" id="cliente_id" name="cliente_id" required>
                            <option value="" selected disabled>Elija un cliente</option>
                            {% for c in clientes %}
                                <option value="{{ c.id }}">{{ c.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="producto_id" class="form-label fw-semibold text-muted">Seleccionar Producto</label>
                        <select class="form-select" id="producto_id" name="producto_id" required>
                            <option value="" selected disabled>Elija un producto</option>
                            {% for prod in productos %}
                                <option value="{{ prod.id }}">{{ prod.nombre }} (Stock: {{ prod.stock }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-4">
                            <label for="stock" class="form-label fw-semibold text-muted">Cantidad</label>
                            <input type="number" class="form-control" id="stock" name="cantidad" required placeholder="La cantidad descontará al stock">
                    </div>
                    <div class="mb-4">
                        <label for="monto" class="form-label fw-semibold text-muted">Monto de la Transaccion</label>
                        <input type="number" step="0.01" class="form-control" id="monto" name="monto" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('bp_pedidos.index') }}" class="btn btn-light border">Cancelar</a>
                        <button type="submit" class="btn btn-dark px-4">Procesar Pedido</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
