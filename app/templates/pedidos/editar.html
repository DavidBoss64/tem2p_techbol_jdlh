{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom border-light pt-4 pb-3">
                <h4 class="mb-0 fw-bold text-dark">Editar Pedido #{{ pedido.id }}</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('bp_pedidos.editar', id=pedido.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="cliente_id" class="form-label fw-semibold text-muted">Seleccionar Cliente</label>
                        <select class="form-select" id="cliente_id" name="cliente_id" required>
                            {% for c in clientes %}
                                <option value="{{ c.id }}" {% if c.id == pedido.cliente_id %}selected{% endif %}>
                                    {{ c.nombre }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="producto_id" class="form-label fw-semibold text-muted">Seleccionar Producto</label>
                        <select class="form-select" id="producto_id" name="producto_id" required>
                            {% for prod in productos %}
                                <option value="{{ prod.id }}" {% if prod.id == pedido.producto_id %}selected{% endif %}>
                                    {{ prod.nombre }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="monto" class="form-label fw-semibold text-muted">Monto de la Transacciom</label>
                        <input type="number" step="0.01" class="form-control" id="monto" name="monto" value="{{ pedido.monto }}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('bp_pedidos.index') }}" class="btn btn-light border">Cancelar</a>
                        <button type="submit" class="btn btn-dark px-4">Actualizar Transaccion</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
