{% extends 'base.html' %}

{% block content %}
<div class="row mb-4 align-items-center mt-4">
    <div class="col-md-8">
        <h2 class="fw-bold text-dark">Directorio de Clientes</h2>
    </div>
    <div class="col-md-4 text-end">
        <a href="{{ url_for('bp_clientes.crear') }}" class="btn btn-success fw-bold">
            Nuevo Cliente
        </a>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Nombre Completp</th>
                        <th>Teléfono</th>
                        <th class="text-end pe-4">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in clientes %}
                    <tr>
                        <td class="ps-4 fw-bold">{{ c.id }}</td>
                        <td>{{ c.nombre }}</td>
                        <td>{{ c.telefono }}</td>
                        <td class="text-end pe-4">
                            <a href="{{ url_for('bp_clientes.editar', id=c.id) }}" class="btn btn-sm btn-outline-secondary">Editar</a>
                            <a href="{{ url_for('bp_clientes.eliminar', id=c.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Confirma eliminar este cliente?');">Eliminar</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">No hay clientes tegistrados</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
