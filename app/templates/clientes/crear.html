{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom border-light pt-4 pb-3">
                <h4 class="mb-0 fw-bold text-dark">Registrar Nuevo Cliente</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('bp_clientes.crear') }}" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold text-muted">Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>
                    <div class="mb-4">
                        <label for="telefono" class="form-label fw-semibold text-muted">Telefono de Contacto</label>
                        <input type="text" class="form-control" id="telefono" name="telefono">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('bp_clientes.index') }}" class="btn btn-light border">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Guardar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
